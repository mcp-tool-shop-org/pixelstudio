name: Dogfood

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: "What did you test?"
        required: true
        type: choice
        options:
          - export-roundtrip-16x16
      execution_mode:
        description: "How did you run it? (mixed = you + AI, human = just you)"
        required: true
        type: choice
        options:
          - mixed
          - human
      verdict:
        description: "Overall result — did the whole scenario work?"
        required: true
        type: choice
        options:
          - pass
          - fail
          - blocked
      screenshot_url:
        description: "Screenshot URL"
        required: true
        type: string
      notes:
        description: "What happened? (e.g. 'exported 16x16 knight, reimported clean')"
        required: false
        type: string
      blocking_reason:
        description: "If blocked — what stopped you?"
        required: false
        type: string
      failed_steps:
        description: "Any steps that failed? (comma-separated, or leave blank if all passed)"
        required: false
        default: ""
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build submission
        id: build
        run: |
          FINISHED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          RUN_ID="glyphstudio-${{ github.run_id }}-${{ github.run_attempt }}"
          FAILED_STEPS="${{ inputs.failed_steps }}"

          # Build step_results: all pass unless listed in failed_steps
          STEP_RESULTS=$(jq -n --arg failed "$FAILED_STEPS" '
            ["launch-app","create-sprite","draw-content","export-png","verify-export"]
            | map({
                "step_id": .,
                "status": (if ($failed | split(",") | map(gsub("^\\s+|\\s+$";"")) | index(.)) then "fail" else "pass" end)
              })')

          # Build evidence array
          EVIDENCE=$(jq -n \
            --arg url "${{ inputs.screenshot_url }}" \
            '[
              {
                "kind": "screenshot",
                "url": $url,
                "description": "Canvas screenshot from dogfood session"
              }
            ]')

          # Build the full submission
          SUBMISSION=$(jq -n \
            --arg schema_version "1.0.0" \
            --arg run_id "$RUN_ID" \
            --arg repo "${{ github.repository }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg sha "${{ github.sha }}" \
            --arg workflow "dogfood.yml" \
            --arg provider_run_id "${{ github.run_id }}" \
            --argjson attempt "${{ github.run_attempt }}" \
            --arg run_url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg actor "${{ github.actor }}" \
            --arg finished_at "$FINISHED_AT" \
            --arg scenario_id "${{ inputs.scenario }}" \
            --arg execution_mode "${{ inputs.execution_mode }}" \
            --arg verdict "${{ inputs.verdict }}" \
            --arg attested_by "${{ github.actor }}" \
            --arg notes "${{ inputs.notes }}" \
            --arg blocking_reason "${{ inputs.blocking_reason }}" \
            --argjson step_results "$STEP_RESULTS" \
            --argjson evidence "$EVIDENCE" \
            '{
              "schema_version": $schema_version,
              "run_id": $run_id,
              "repo": $repo,
              "ref": { "branch": $branch, "commit_sha": $sha },
              "source": {
                "provider": "github",
                "workflow": $workflow,
                "provider_run_id": $provider_run_id,
                "attempt": $attempt,
                "run_url": $run_url,
                "actor": $actor
              },
              "timing": {
                "started_at": $finished_at,
                "finished_at": $finished_at,
                "duration_ms": 0
              },
              "scenario_results": [
                {
                  "scenario_id": $scenario_id,
                  "scenario_name": "Export roundtrip: 16x16 sprite",
                  "scenario_version": "1.0.0",
                  "product_surface": "desktop",
                  "execution_mode": $execution_mode,
                  "verdict": $verdict,
                  "attested_by": $attested_by,
                  "step_results": $step_results,
                  "evidence": $evidence,
                  "notes": $notes
                }
                + (if $blocking_reason != "" then { "blocking_reason": $blocking_reason } else {} end)
              ],
              "overall_verdict": $verdict,
              "notes": ("Dogfood session by " + $attested_by + ". " + $notes)
            }')

          echo "$SUBMISSION" > /tmp/submission.json
          jq empty /tmp/submission.json
          echo "Submission built:"
          jq '.run_id, .overall_verdict' /tmp/submission.json

      - name: Dispatch to testing-os
        env:
          GH_TOKEN: ${{ secrets.DOGFOOD_TOKEN }}
        run: |
          SUBMISSION=$(cat /tmp/submission.json)
          RUN_ID=$(echo "$SUBMISSION" | jq -r '.run_id')

          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::DOGFOOD_TOKEN not set — skipping dispatch"
            exit 0
          fi

          jq -n --argjson sub "$SUBMISSION" \
            '{"event_type":"dogfood_submission","client_payload":{"submission":$sub}}' \
            | gh api repos/dogfood-lab/testing-os/dispatches \
              --input - --silent

          echo "Dispatched $RUN_ID to testing-os"
